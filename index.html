<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#001a09;min-height:100vh;display:flex;align-items:center;justify-content:center;}
#stage{
  width:100%;min-height:100vh;background:#001a09;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;overflow:hidden;cursor:none;user-select:none;
}
#parchment-wrap{position:relative;width:360px;height:460px;}

/* 純CSS牛皮紙質感，不用SVG filter */
#parchment{
  position:absolute;inset:0;
  background:
    linear-gradient(135deg, #e8d8a0 0%, #f4eacb 30%, #ecdcb4 60%, #e2d4a8 100%);
  border-radius:3px;
  box-shadow:
    inset 0 0 40px rgba(160,120,40,0.15),
    inset 2px 2px 8px rgba(200,160,60,0.1),
    0 8px 32px rgba(0,0,0,0.5);
}
#parchment::before{
  content:'';position:absolute;inset:8px;
  border:1px solid rgba(180,140,50,0.3);
  border-radius:2px;pointer-events:none;
}
#parchment::after{
  content:'';position:absolute;inset:0;
  background:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent 28px,
      rgba(160,120,40,0.06) 28px,
      rgba(160,120,40,0.06) 29px
    );
  border-radius:3px;pointer-events:none;
}

#parchment-content{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:44px 36px 120px;z-index:2;gap:0;
}
#re-title{
  font-family:'Cinzel',Georgia,serif;font-size:13px;letter-spacing:0.22em;
  color:#8a6a1a;text-align:center;margin-bottom:3px;
}
#re-sub{font-size:10px;letter-spacing:0.24em;color:#a07830;margin-bottom:20px;text-align:center;}
#divider-top{
  width:200px;height:1px;
  background:linear-gradient(90deg,transparent,#c8a84a,transparent);
  margin-bottom:28px;
}
#three-jing{display:flex;gap:20px;align-items:center;margin-bottom:20px;}
.jing-item{text-align:center;}
.jing-zh{
  font-size:22px;color:#7a5810;display:block;
  letter-spacing:0.12em;line-height:1;
  font-family:Georgia,'Noto Serif TC',serif;
}
.jing-en{font-size:9px;color:#a07830;letter-spacing:0.16em;display:block;margin-top:5px;font-family:Georgia,serif;}
.jing-dot{font-size:18px;color:#c8a04a;opacity:0.5;}
#divider-mid{
  width:200px;height:1px;
  background:linear-gradient(90deg,transparent,#c8a84a,transparent);
  margin-bottom:20px;
}
#voice-line{
  font-family:Georgia,serif;font-size:17px;color:#5a3e0a;
  text-align:center;letter-spacing:0.08em;font-style:italic;line-height:1.5;
}
#voice-sub{font-size:9px;color:#9a7830;letter-spacing:0.2em;text-align:center;margin-top:8px;font-family:Georgia,serif;}
#divider-bot{
  width:200px;height:1px;
  background:linear-gradient(90deg,transparent,#c8a84a,transparent);
  margin-top:24px;
}

#slot-area{
  position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
  width:80px;height:90px;display:flex;align-items:center;justify-content:center;z-index:3;
}
#slot-svg{width:80px;height:90px;overflow:visible;}
#slot-path{
  fill:rgba(200,168,74,0.07);stroke:#c8a84a;stroke-width:2;
  stroke-dasharray:5,4;transition:all 0.25s;
}
#slot-path.glow{
  fill:rgba(245,200,66,0.17);stroke:#f5d060;
  filter:drop-shadow(0 0 7px rgba(245,208,96,0.45));
}
#snap-shield{
  position:absolute;bottom:32px;left:50%;transform:translateX(-50%);
  width:80px;height:90px;display:none;align-items:center;justify-content:center;z-index:4;
}
#glow-ring{
  position:absolute;bottom:18px;left:50%;transform:translateX(-50%) scale(0.8);
  width:96px;height:108px;border:2px solid #f5d060;border-radius:50%;
  opacity:0;pointer-events:none;z-index:5;transition:all 0.5s ease;
}
#instruction{
  position:absolute;bottom:8px;left:0;right:0;text-align:center;
  font-size:10px;color:#D1B06B;letter-spacing:0.14em;font-family:Georgia,serif;z-index:10;
}
#cursor-shield{
  position:fixed;width:52px;height:58px;pointer-events:none;
  transform:translate(-50%,-50%);z-index:9999;display:none;
}
#menu{
  display:none;flex-direction:column;align-items:center;gap:14px;
  width:100%;padding:40px 20px;min-height:100vh;
  background:#001a09;animation:fadeUp 0.7s ease;justify-content:center;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.menu-logo{width:72px;height:80px;margin-bottom:6px;}
.menu-title{font-family:'Cinzel',Georgia,serif;font-size:19px;color:#D1B06B;letter-spacing:0.1em;text-align:center;}
.menu-sub{font-size:11px;color:#7a6030;letter-spacing:0.2em;margin-bottom:10px;font-family:Georgia,serif;}
.menu-btn{
  width:280px;padding:14px 20px;background:transparent;border:1px solid #7a6030;
  border-radius:2px;color:#c8a84a;font-family:Georgia,serif;font-size:13px;
  letter-spacing:0.06em;cursor:pointer;transition:all 0.2s;display:flex;
  align-items:center;gap:14px;text-decoration:none;
}
.menu-btn:hover{border-color:#D1B06B;background:rgba(200,168,74,0.1);color:#f5d878;}
.menu-icon{font-size:20px;flex-shrink:0;}
.menu-txt-title{font-weight:bold;display:block;font-size:13px;}
.menu-txt-desc{font-size:10px;opacity:0.6;display:block;margin-top:3px;letter-spacing:0.08em;}
.back-btn{
  background:none;border:none;color:#5a4820;font-size:11px;cursor:pointer;
  letter-spacing:0.1em;text-decoration:underline;margin-top:6px;font-family:Georgia,serif;
}

/* 手機版 */
@media(max-width:480px){
  #parchment-wrap{width:min(340px, 92vw);height:440px;}
  #re-title{font-size:11px;}
  .jing-zh{font-size:19px;}
  #voice-line{font-size:15px;}
  nav{padding:14px 16px;}
  .nav-links a{letter-spacing:0.08em;gap:16px;}
}
</style>
</head>
<body>

  <div id="parchment-wrap">
    <div id="parchment"></div>

    <div id="parchment-content">

        <span class="jing-dot">·</span>

    <div id="snap-shield">
      <svg viewBox="0 0 80 90" xmlns="http://www.w3.org/2000/svg" width="80" height="90">

        <path d="M40 10 L68 20 L68 44 Q68 61 52 70 Q46 74 40 77 Q34 74 28 70 Q12 61 12 44 L12 20 Z" fill="none" stroke="#c8a84a" stroke-width="0.8" opacity="0.5"/>

    <path d="M40 10 L68 20 L68 44 Q68 61 52 70 Q46 74 40 77 Q34 74 28 70 Q12 61 12 44 L12 20 Z" fill="none" stroke="#c8a84a" stroke-width="0.8" opacity="0.5"/>
    <text x="40" y="56" font-family="Georgia,serif" font-size="30" font-weight="bold" fill="#D1B06B" text-anchor="middle">M</text>

  <svg viewBox="0 0 52 58" xmlns="http://www.w3.org/2000/svg" width="52" height="58">

    <path d="M26 8 L43 15 L43 29 Q43 40 33 45 Q29.5 47 26 49 Q22.5 47 19 45 Q9 40 9 29 L9 15 Z" fill="none" stroke="#c8a84a" stroke-width="0.6" opacity="0.5"/>

<script>
const stage=document.getElementById('stage');
const cur=document.getElementById('cursor-shield');
const slotPath=document.getElementById('slot-path');
const slotLabel=document.getElementById('slot-label-svg');
const snap=document.getElementById('snap-shield');
const glowRing=document.getElementById('glow-ring');
const instr=document.getElementById('instruction');
const menu=document.getElementById('menu');
let mx=0,my=0,snapped=false;

// 偵測手機，不啟用cursor遊標效果
const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

if(!isMobile){
  document.addEventListener('mousemove',e=>{
    cur.style.left=e.clientX+'px';
    cur.style.top=e.clientY+'px';
  });
  stage.addEventListener('mouseenter',()=>{if(!snapped)cur.style.display='block';});
  stage.addEventListener('mouseleave',()=>{cur.style.display='none';});
  stage.addEventListener('mousemove',e=>{
    if(snapped)return;
    const r=stage.getBoundingClientRect();
    mx=e.clientX-r.left;my=e.clientY-r.top;
    const sa=document.getElementById('slot-area').getBoundingClientRect();
    const cx=sa.left-r.left+sa.width/2;
    const cy=sa.top-r.top+sa.height/2;
    const d=Math.sqrt((mx-cx)**2+(my-cy)**2);
    if(d<72){
      slotPath.classList.add('glow');
      instr.textContent='release to lock it in ✦';
      instr.style.color='#f5d060';
      cur.style.transform=`translate(-50%,-50%) scale(${1.08+0.07*(1-d/72)})`;
    } else {
      slotPath.classList.remove('glow');
      instr.textContent='bring the shield to the slot';
      instr.style.color='#D1B06B';
      cur.style.transform='translate(-50%,-50%) scale(1)';
    }
  });
  stage.addEventListener('click',e=>{
    if(snapped)return;
    const r=stage.getBoundingClientRect();
    mx=e.clientX-r.left;my=e.clientY-r.top;
    const sa=document.getElementById('slot-area').getBoundingClientRect();
    const cx=sa.left-r.left+sa.width/2;
    const cy=sa.top-r.top+sa.height/2;
    const d=Math.sqrt((mx-cx)**2+(my-cy)**2);
    if(d<90)doSnap();
  });
} else {
  // 手機版：直接點盾牌槽口觸發
  stage.style.cursor='default';
  instr.textContent='點擊盾牌鑲嵌';
  document.getElementById('slot-area').addEventListener('click',()=>{
    if(!snapped)doSnap();
  });
  // 手機版slot加大點擊區域
  document.getElementById('slot-area').style.width='120px';
  document.getElementById('slot-area').style.height='130px';
}

function doSnap(){
  snapped=true;cur.style.display='none';
  slotPath.style.display='none';slotLabel.style.display='none';
  snap.style.display='flex';
  glowRing.style.opacity='1';glowRing.style.transform='translateX(-50%) scale(1.1)';
  setTimeout(()=>{glowRing.style.opacity='0';glowRing.style.transform='translateX(-50%) scale(1.45)';},400);
  instr.textContent='✦  make your voice heard  ✦';instr.style.color='#f5d060';
  setTimeout(()=>{
    stage.style.transition='opacity 0.9s';stage.style.opacity='0';
    setTimeout(()=>{stage.style.display='none';menu.style.display='flex';},900);
  },1400);
}

function reset(){
  snapped=false;menu.style.display='none';
  stage.style.display='flex';stage.style.opacity='1';
  snap.style.display='none';
  slotPath.style.display='';slotLabel.style.display='';
  slotPath.classList.remove('glow');
  glowRing.style.opacity='0';glowRing.style.transform='translateX(-50%) scale(0.8)';
  instr.textContent=isMobile?'點擊盾牌鑲嵌':'bring the shield to the slot';
  instr.style.color='#D1B06B';
  cur.style.display='none';
}
</script>
